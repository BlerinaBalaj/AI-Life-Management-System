server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:}

spring:
  application:
    name: ai-life-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_life_management}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: ${CACHE_TYPE:simple}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  data:
    redis:
      repositories:
        enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

app:
  seed:
    demo-data: ${SEED_DEMO_DATA:false}
  ai:
    provider: ${AI_PROVIDER:llama}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:admin@ailife.local}
    password: ${DEFAULT_ADMIN_PASSWORD:Admin12345!}

llama:
  api-key: ${LLAMA_API_KEY:${GROQ_API_KEY:}}
  base-url: ${LLAMA_BASE_URL:${GROQ_BASE_URL:https://api.groq.com/openai/v1}}
  model: ${LLAMA_MODEL:${GROQ_MODEL:llama-3.3-70b-versatile}}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
