server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-life-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_life_management}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: ${CACHE_TYPE:simple}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  data:
    redis:
      repositories:
        enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-4.1-mini}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:admin@ailife.local}
    password: ${DEFAULT_ADMIN_PASSWORD:Admin12345!}
