spring:
  datasource:
    url: jdbc:h2:mem:ailife;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cache:
    type: simple

security:
  jwt:
    secret: change-this-dev-secret-change-this-dev-secret
    expiration-minutes: 60

app:
  ai:
    provider: llama

llama:
  api-key:
  base-url: http://localhost:11434/v1
  model: llama-test-model
